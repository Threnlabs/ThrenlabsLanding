# ============================================================================
# NETLIFY DEPLOYMENT CONFIGURATION
# ============================================================================

[build]
  # Build command to typecheck and compile the frontend inside the monorepo
  command = "pnpm run build"
  
  # The path to the compiled HTML/JS/CSS assets ready for hosting
  publish = "artifacts/threnlabs/dist"

[build.environment]
  # Ensure Netlify uses Node 20
  NODE_VERSION = "20"
  
  # Configure pnpm store path to optimize installation and caching
  PNPM_FLAGS = "--store-dir=.pnpm-store"

# ============================================================================
# ROUTING & SPA REDIRECTS
# ============================================================================



# Ensures client-side routing (wouter/react-router) works properly by directing
# all other requests back to index.html instead of showing a Netlify 404 page.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ============================================================================
# PERFORMANCE & CACHING HEADERS
# ============================================================================

# Ensure sitemap.xml is served with correct XML Content-Type and is not cached stale
[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml; charset=utf-8"
    Cache-Control = "public, max-age=0, must-revalidate"

# Ensure robots.txt is served with correct plain text Content-Type and is not cached stale
[[headers]]
  for = "/robots.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"
    Cache-Control = "public, max-age=0, must-revalidate"

# Cache compiled asset bundles (Vite outputs hashed JS/CSS in the assets folder)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache static SVGs and images
[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=86400, must-revalidate"

