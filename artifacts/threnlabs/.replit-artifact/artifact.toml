kind = "web"
previewPath = "/"
title = "ThrenlabsAI Landing Page"
version = "1.0.0"
id = "artifacts/threnlabs"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24804

[services.development]
run = "pnpm --filter @workspace/threnlabs run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/threnlabs", "run", "build" ]
publicDir = "artifacts/threnlabs/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24804"
BASE_PATH = "/"
